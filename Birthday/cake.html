<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Cake</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="cake.css">
</head>
<body>

<div class="hearts">❤️ 💖 💕 💗 ❤️</div>

<h1>Happy Birthday 🎂</h1>

<div class="cake">

    <div class="candle">
        <div id="flame"></div>
    </div>

    <div class="top"></div>
    <div class="middle"></div>
    <div class="bottom"></div>

</div>

<button id="blowBtn" onclick="blowCandle()">
    🎤 Blow Candle
</button>

<div id="message">
    May god bless you❤️
</div>

<button id="nextBtn"
onclick="window.location.href='letter.html'">
    Continue ➜
</button>

<div id="confetti"></div>

<script src="cake.js"></script>

</body>
</html>
